name: UT Bot Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制Node.js 24，消除警告

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pytz requests
      - name: Run Bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python utbot_signal.py
