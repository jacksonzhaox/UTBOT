name: UT Bot Signal

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  utbot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install yfinance pandas numpy requests pytz tradingview-ta

      - name: 下载历史 seen 文件
        uses: dawidd6/action-download-artifact@v6
        with:
          name: utbot-seen
          path: .
          if_no_artifact_found: ignore
        continue-on-error: true

      - name: UT Bot 信号监控
        env:
          FEISHU_WEBHOOK: ${{ secrets.UTBOT_WEBHOOK }}
        run: python utbot_signal.py

      - name: 上传最新 seen 文件
        uses: actions/upload-artifact@v4
        with:
          name: utbot-seen
          path: utbot_seen.json
          retention-days: 7
          overwrite: true
