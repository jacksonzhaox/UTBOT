name: UT Bot Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 升级到v5，原生支持Node.js 24，彻底消除警告
      - uses: actions/checkout@v5
      - name: Set up Python
        # 升级到v6，原生支持Node.js 24
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance pytz requests
      - name: Run Bot
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python utbot_signal.py
