name: UT Bot 15分钟信号监控

on:
  schedule:
    # 北京时间 0/15/30/45分 30秒 → UTC时间 对应 前一天/当天 16/31/46/1分（UTC+8）
    - cron: '30 16,31,46,1 * * *'
  workflow_dispatch:                # 允许手动触发测试

jobs:
  run-utbot:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas pytz requests

      - name: 运行 UT Bot 信号扫描
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python utbot_signal.py
