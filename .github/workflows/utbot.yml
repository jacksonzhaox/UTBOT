name: UT Bot 15分钟信号监控

on:
  schedule:
    - cron: '30 0,15,30,45 * * * *'  # 每15分钟:00分30秒运行
  workflow_dispatch:                # 允许手动触发测试

jobs:
  run-utbot:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install ccxt pandas pytz requests

      - name: 运行 UT Bot 信号扫描
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python utbot_signal.py
