name: UT Bot Signal

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  utbot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: pip install yfinance pandas numpy requests
      - name: UT Bot 信号监控
        env:
          FEISHU_WEBHOOK: ${{ secrets.UTBOT_WEBHOOK }}
        run: python utbot_signal.py
